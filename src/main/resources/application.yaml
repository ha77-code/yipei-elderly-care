spring:
  application:
    name: yipei

  # MySQL 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/yipei?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 20050323Zz@
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置；Redis 不可用时订单防重复提交自动降级
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yipei.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件上传本地存储路径
yipei:
  upload-dir: uploads
